version: '3.8'

# Nango Self-Hosted Docker Compose Configuration
# This runs Nango locally for complete control over OAuth token management
#
# IMPORTANT: Nango uses a cloud proxy for OAuth callbacks.
# Your callback URL will be something like: https://irremovable-xxxxx.nango.dev/oauth/callback
# This proxy forwards callbacks to your local Nango instance.
# Tokens are stored locally in YOUR PostgreSQL database.

services:
  # Nango Server - Main API and OAuth handler
  nango-server:
    image: nangohq/nango-server:latest
    container_name: nango-server
    ports:
      # Bind to all interfaces (0.0.0.0) so it's accessible from network
      - "0.0.0.0:3003:3003"
    # Load environment variables from main .env file
    env_file:
      - D:/Balu/GitHub/DevSrcSubbaRao/UPMY/.env
    environment:
      # Authentication keys - Nango expects these exact names
      # MUST match the keys used in tenant containers (tenants/gmail/docker-compose.yml)
      # Using hardcoded values to ensure consistency across all containers
      - NANGO_SECRET_KEY=2fcce571-d647-4102-9b22-27264a6b2eb3
      # Nango server needs NANGO_PUBLIC_KEY (not NEXT_PUBLIC_NANGO_PUBLIC_KEY)
      - NANGO_PUBLIC_KEY=ae0757c4-81a5-4faa-82ee-dcd8498f10a5
      
      # Database
      - DATABASE_URL=postgresql://nango:nango@nango-postgres:5432/nango
      - NANGO_DATABASE_SCHEMA=nango
      
      # Encryption for token storage - MUST be base64-encoded 32-byte key
      # MUST match tenant containers!
      # NOTE: Once set in database, this cannot be changed without resetting the database
      # If you get "Encryption key must be base64-encoded" error, reset the database:
      # docker-compose down -v (removes volumes) then docker-compose up -d
      - NANGO_ENCRYPTION_KEY=gjUGOsxsGy5kD1Ssno84rBLiHYCzu/QK7vGbmJzAZUo=
      
      # Server configuration
      - SERVER_PORT=3003
      - NANGO_SERVER_URL=http://172.16.34.39:3003
      - NODE_ENV=production
      - NANGO_LOGS_ENABLED=true
      
      # The callback URL is automatically generated by Nango as a proxy URL
      # Example: https://irremovable-xxxxx.nango.dev/oauth/callback
      # This proxy forwards to your local Nango instance
      # You'll see this URL in the Nango logs when it starts
      #
      # IMPORTANT: Configure integrations (Client ID, Secret, Scopes) in the
      # Nango Dashboard UI, NOT in docker-compose.yml or code!
      # Access dashboard at: http://localhost:3003 (or your Nango server URL)
      
      # Disable SSL verification for local development
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      nango-postgres:
        condition: service_healthy
    networks:
      - nango-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database for Nango
  nango-postgres:
    image: postgres:15-alpine
    container_name: nango-postgres
    environment:
      - POSTGRES_USER=nango
      - POSTGRES_PASSWORD=nango
      - POSTGRES_DB=nango
    volumes:
      - nango_postgres_data:/var/lib/postgresql/data
    networks:
      nango-network:
        aliases:
          - nango-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nango -d nango"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Nango (optional but recommended for caching)
  nango-redis:
    image: redis:7-alpine
    container_name: nango-redis
    ports:
      - "6380:6379"
    volumes:
      - nango_redis_data:/data
    networks:
      - nango-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nango-network:
    driver: bridge
    name: nango-network

volumes:
  nango_postgres_data:
    name: nango_postgres_data
  nango_redis_data:
    name: nango_redis_data

